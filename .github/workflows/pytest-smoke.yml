name: tests

on:
    push:
        branches:
            - main
            - 'releases/**'
    pull_request:
        branches:
            - main
            - 'releases/**'
    workflow_dispatch:

permissions: {}

jobs:
  test:
    # Runs integration tests against the live Pluto server; the API token
    # (MLOP_API_TOKEN) is scoped to the "integration" environment.
    environment: integration
    permissions:
      contents: read
    strategy:
      # Run every Python version even if one fails. The smoke tests hit the
      # production Pluto server and intermittently flake on cold-start /
      # transient connectivity (ConnectionError, RemoteProtocolError). With
      # fail-fast: true (the default) one flaky version cancels all others
      # and forces a re-run that may flake on a different version, costing
      # multiple cycles to get every version green simultaneously.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        poetry-version: ["2.1.1"]
    runs-on: ubicloud-standard-4
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{matrix.python-version}}

      - name: Install Poetry
        run: pip install poetry==${{matrix.poetry-version}}
      
      - name: Install deps and login
        run: |
          set -euox pipefail
          # Clear stale cached venv that may be missing dev dependencies
          rm -rf .venv
          poetry install --with dev --extras full
          pip install -e ".[dev,full]"
          poetry run pip install pytest-cov
          # Deploy the wandb auto-activation .pth — poetry-core's editable
          # install doesn't copy it into site-packages on its own.
          bash dev-install.sh
          pluto login ${{ secrets.MLOP_API_TOKEN }}

      - name: Run pytest smoke tests
        env:
          PLUTO_API_KEY: ${{ secrets.MLOP_API_TOKEN }}
        run: |
          set -euox pipefail
          poetry run pytest -n auto -rs -m "not distributed" tests \
            --cov=pluto \
            --cov=mlop \
            --cov-report=lcov:coverage.lcov \
            --cov-report=term

      - name: Upload coverage to Coveralls
        if: matrix.python-version == '3.11'
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b  # v2.3.6
        with:
          github-token: ${{ secrets.COVERALLS_REPO_TOKEN }}
          file: coverage.lcov

  fork-e2e:
    needs: test
    # Needs MLOP_API_TOKEN — scoped to the "integration" environment.
    environment: integration
    permissions:
      contents: read
    runs-on: ubicloud-standard-4
    strategy:
      matrix:
        python-version: ["3.11"]
        poetry-version: ["2.1.1"]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{matrix.python-version}}

      - name: Install Poetry
        run: pip install poetry==${{matrix.poetry-version}}

      - name: Install deps and login
        run: |
          set -euox pipefail
          rm -rf .venv
          poetry install --with dev --extras full
          pip install -e ".[dev,full]"
          pluto login ${{ secrets.MLOP_API_TOKEN }}

      - name: Run fork integration test
        timeout-minutes: 5
        env:
          PLUTO_API_KEY: ${{ secrets.MLOP_API_TOKEN }}
        run: |
          set -euox pipefail
          poetry run python tests/fork_integration_test.py 2>&1 | tee fork_integration.log

      - name: Run fork chain test
        timeout-minutes: 10
        env:
          PLUTO_API_KEY: ${{ secrets.MLOP_API_TOKEN }}
        run: |
          set -euox pipefail
          poetry run python tests/manual_fork_chain.py 2>&1 | tee fork_chain.log

      - name: Run fork E2E tests
        timeout-minutes: 5
        env:
          PLUTO_API_KEY: ${{ secrets.MLOP_API_TOKEN }}
        run: |
          set -euox pipefail
          poetry run pytest tests/test_fork_e2e.py -rs -v 2>&1 | tee fork_e2e.log

      - name: Upload fork logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fork-e2e-logs
          path: |
            fork_integration.log
            fork_chain.log
            fork_e2e.log
          retention-days: 7

  distributed-tests:
    needs: test
    # Needs MLOP_API_TOKEN — scoped to the "integration" environment.
    environment: integration
    permissions:
      contents: read
    runs-on: ubicloud-standard-4
    strategy:
      matrix:
        python-version: ["3.10"]
        poetry-version: ["2.1.1"]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{matrix.python-version}}

      - name: Install Poetry
        run: pip install poetry==${{matrix.poetry-version}}

      - name: Install deps and login
        env:
          MLOP_API_TOKEN: ${{ secrets.MLOP_API_TOKEN }}
        run: |
          set -euox pipefail
          # Clear stale cached venv that may be missing dev dependencies
          rm -rf .venv
          poetry install --with dev --extras full
          pip install -e ".[dev,full]"
          pluto login "${MLOP_API_TOKEN}"

      - name: Run DDP watch tests
        timeout-minutes: 5
        env:
          PLUTO_DEBUG_LEVEL: DEBUG
        run: |
          set -euox pipefail
          poetry run torchrun --standalone --nproc-per-node=2 -m pytest tests/test_pytorch.py -k test_pluto_watch_on_ddp_model -m distributed -rs -v 2>&1 | tee ddp_test.log

      - name: Upload DDP test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ddp-test-logs
          path: ddp_test.log
          retention-days: 7

      - name: Run multinode E2E tests
        timeout-minutes: 5
        env:
          PLUTO_DEBUG_LEVEL: DEBUG
        run: |
          set -euox pipefail
          poetry run torchrun --standalone --nproc-per-node=2 -m pytest tests/test_multinode.py::TestMultiNodeE2E -m distributed -rs -v 2>&1 | tee multinode_test.log

      - name: Upload multinode test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: multinode-test-logs
          path: multinode_test.log
          retention-days: 7

      # TODO(asaiacai): FSDP requires GPU to test
