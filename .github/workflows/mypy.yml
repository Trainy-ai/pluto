name: mypy

on:
    push:
        branches:
            - main
            - 'releases/**'
    pull_request:
        branches:
            - main
            - 'releases/**'
    workflow_dispatch:

permissions: {}

jobs:
  mypy:
    permissions:
      contents: read
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry==2.1.1

      - name: Install dependencies
        run: poetry install --with dev

      - name: Running mypy
        run: |
          set -euxo pipefail
          poetry run python3 -m pip install types-PyYAML
          poetry run mypy pluto