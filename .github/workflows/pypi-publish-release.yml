name: Publish Release to PyPI (pluto-ml)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0). Required for manual trigger.'
        required: true

permissions: {}

jobs:
  release-build-pypi:
    # Isolate PyPI publishing from secrets on other branches. The "build"
    # environment can be restricted (via repo settings) to protected branches
    # so rogue workflows on feature branches can't reach its secrets/OIDC.
    environment: build
    permissions:
      contents: write  # commits version bump back to main
      id-token: write  # OIDC for PyPI Trusted Publishing
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Fetch full history so we can push the version bump commit back
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry

      - name: Extract version from release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Bump version in source files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "0,/version = \".*\"/s//version = \"${VERSION}\"/" pyproject.toml
          sed -i "s/__version__ = '.*'/__version__ = '${VERSION}'/g" pluto/__init__.py

      - name: Commit version bump to main
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml pluto/__init__.py
          git diff --cached --quiet && echo "No version changes needed" || \
            (git commit -m "Bump version to ${VERSION}" && git push origin main)

      - name: Update version placeholders for build
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/{{PLUTO_COMMIT_SHA}}/${{ github.sha }}/g" pluto/__init__.py
          sed -i "s/__version__ = '.*'/__version__ = '${VERSION}'/g" pluto/__init__.py

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
